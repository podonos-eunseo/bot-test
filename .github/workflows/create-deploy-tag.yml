name: 'Deploy Request'
on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: 'choice'
        options:
          - 'fe'
          - 'be'
          - 'maga'
          - 'ai'
          - 'transcription'
      environment:
        description: 'Environment to deploy'
        required: true
        type: 'choice'
        options:
          - 'dev'
          - 'stag'
          - 'prod'
      version:
        description: 'Version tag (e.g. v0.0.1)'
        required: true
        type: 'string'
      sha:
        description: 'Commit SHA to deploy'
        required: false
        type: 'string'
      requested_by:
        description: 'Requested by'
        required: true
        type: 'string'
jobs:
  create-tag-and-deploy:
    runs-on: 'ubuntu-latest'
    # GITHUB_TOKEN permissions intentionally empty: git push uses GitHub App token configured by actions/checkout
    permissions: {}
    steps:
      - name: 'Validate SHA format'
        if: inputs.sha != ''
        env:
          SHA: '${{ inputs.sha }}'
        run: |
          if [[ ! "${SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid SHA format '${SHA}'. Expected 40-character hex string."
            exit 1
          fi
      - name: 'Validate version format'
        env:
          VERSION: '${{ inputs.version }}'
        run: |
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format '${VERSION}'. Expected format: v0.0.1"
            exit 1
          fi
      - name: 'Generate GitHub App token'
        id: 'app-token'
        uses: 'actions/create-github-app-token@v1'
        with:
          app-id: '${{ secrets.DEPLOY_BOT_APP_ID }}'
          private-key: '${{ secrets.DEPLOY_BOT_APP_PRIVATE_KEY }}'
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
        with:
          ref: '${{ inputs.sha || github.sha }}'
          token: '${{ steps.app-token.outputs.token }}'
      - name: 'Create and push tag'
        env:
          SERVICE: '${{ inputs.service }}'
          ENVIRONMENT: '${{ inputs.environment }}'
          VERSION: '${{ inputs.version }}'
          REQUESTED_BY: '${{ inputs.requested_by }}'
        run: |
          TAG_NAME="podonos-apple-${SERVICE}-${ENVIRONMENT}-${VERSION}"
          git config user.name "deploy-bot"
          git config user.email "deploy-bot@noreply.github.com"
          git tag -a "$TAG_NAME" -m "Deploy ${SERVICE} to ${ENVIRONMENT} by ${REQUESTED_BY}"
          if ! git push origin "$TAG_NAME" 2>&1; then
            echo "::error::Failed to push tag ${TAG_NAME}. It may already exist."
            exit 1
          fi
