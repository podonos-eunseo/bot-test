name: 'Deploy Request'
on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (fe, be, maga, ai, transcription)'
        required: true
        type: 'string'
      environment:
        description: 'Environment to deploy (dev, stag, prod)'
        required: true
        type: 'string'
      version:
        description: 'Version tag (e.g. v0.0.1)'
        required: true
        type: 'string'
      sha:
        description: 'Commit SHA to deploy'
        required: false
        type: 'string'
      requested_by:
        description: 'Requested by'
        required: true
        type: 'string'
jobs:
  create-tag-and-deploy:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'write'
    steps:
      - name: 'Generate GitHub App token'
        id: 'app-token'
        uses: 'actions/create-github-app-token@v1'
        with:
          app-id: '${{ secrets.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
        with:
          ref: '${{ inputs.sha || github.sha }}'
      - name: 'Create and push tag'
        env:
          SERVICE: '${{ inputs.service }}'
          ENVIRONMENT: '${{ inputs.environment }}'
          VERSION: '${{ inputs.version }}'
          REQUESTED_BY: '${{ inputs.requested_by }}'
          GH_TOKEN: '${{ steps.app-token.outputs.token }}'
        run: |
          TAG_NAME="podonos-apple-${SERVICE}-${ENVIRONMENT}-${VERSION}"
          git config user.name "deploy-bot"
          git config user.email "deploy-bot@noreply.github.com"
          git tag -a "$TAG_NAME" -m "Deploy ${SERVICE} to ${ENVIRONMENT} by ${REQUESTED_BY}"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }} "$TAG_NAME"
